<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 648">
  <defs>
    <!-- Dot grid texture -->
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.9" fill="#ffffff0c"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arr-amber" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arr-violet" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-emerald" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#34d399"/>
    </marker>

    <!-- Glow filters -->
    <filter id="g-amber" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f59e0b" flood-opacity="0.4"/>
    </filter>
    <filter id="g-violet" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#a78bfa" flood-opacity="0.4"/>
    </filter>
    <filter id="g-emerald" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#34d399" flood-opacity="0.4"/>
    </filter>
    <filter id="g-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#60a5fa" flood-opacity="0.4"/>
    </filter>
    <filter id="g-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#22d3ee" flood-opacity="0.4"/>
    </filter>

    <!-- Top title bar gradient -->
    <linearGradient id="title-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3b82f6" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>

    <!-- Section rule gradients -->
    <linearGradient id="rule-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="60%"  stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rule-emerald" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="60%"  stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rule-violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="60%"  stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1000" height="648" fill="#080c14"/>
  <rect width="1000" height="648" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1000" height="2.5" fill="url(#title-bar)"/>

  <!-- ── Title ── -->
  <text x="500" y="34" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="19" font-weight="bold" fill="#f1f5f9" letter-spacing="1.5">
    BMO RAG Pipeline Architecture
  </text>
  <text x="500" y="54" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#475569" letter-spacing="3">
    INGESTION  ·  VECTOR STORES  ·  QUERY
  </text>


  <!-- ══════════════════════════════════════════
       SECTION 1: INGESTION PATH
  ══════════════════════════════════════════ -->
  <text x="26" y="79" font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#f59e0b" letter-spacing="3" font-weight="bold">INGESTION PATH</text>
  <rect x="26" y="83" width="948" height="1" fill="url(#rule-amber)"/>

  <!-- Azure Blob Storage -->
  <rect x="22" y="98" width="118" height="74" rx="7"
        fill="#0a1020" stroke="#3b82f6" stroke-width="1.5" filter="url(#g-blue)"/>
  <text x="81" y="122" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" font-weight="bold" fill="#93c5fd">Azure Blob</text>
  <text x="81" y="139" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" font-weight="bold" fill="#93c5fd">Storage</text>
  <text x="81" y="158" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#3b82f6">PDF · MD · TXT</text>

  <!-- Arrow: Azure → extract -->
  <line x1="141" y1="135" x2="164" y2="135" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Stage 1: extract.py -->
  <rect x="166" y="98" width="126" height="74" rx="7"
        fill="#0e0c02" stroke="#f59e0b" stroke-width="1.5" filter="url(#g-amber)"/>
  <text x="229" y="120" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#fbbf24" letter-spacing="1">STAGE 1</text>
  <text x="229" y="139" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#fef3c7">extract.py</text>
  <text x="229" y="158" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#f59e0b">PyMuPDF · Tesseract · BS4</text>

  <!-- Arrow: extract → chunk -->
  <line x1="293" y1="135" x2="316" y2="135" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Stage 2: chunk.py -->
  <rect x="318" y="98" width="126" height="74" rx="7"
        fill="#0e0c02" stroke="#f59e0b" stroke-width="1.5" filter="url(#g-amber)"/>
  <text x="381" y="120" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#fbbf24" letter-spacing="1">STAGE 2</text>
  <text x="381" y="139" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#fef3c7">chunk.py</text>
  <text x="381" y="158" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#f59e0b">SentenceSplitter / Semantic</text>

  <!-- Arrow: chunk → embed -->
  <line x1="445" y1="135" x2="468" y2="135" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Stage 3: embed.py -->
  <rect x="470" y="98" width="126" height="74" rx="7"
        fill="#0e0c02" stroke="#f59e0b" stroke-width="1.5" filter="url(#g-amber)"/>
  <text x="533" y="120" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#fbbf24" letter-spacing="1">STAGE 3</text>
  <text x="533" y="139" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#fef3c7">embed.py</text>
  <text x="533" y="158" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#f59e0b">text-embedding-3-small</text>

  <!-- Arrow: embed → index -->
  <line x1="597" y1="135" x2="620" y2="135" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Stage 4: index.py -->
  <rect x="622" y="98" width="126" height="74" rx="7"
        fill="#0e0c02" stroke="#f59e0b" stroke-width="1.5" filter="url(#g-amber)"/>
  <text x="685" y="120" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#fbbf24" letter-spacing="1">STAGE 4</text>
  <text x="685" y="139" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#fef3c7">index.py</text>
  <text x="685" y="158" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#f59e0b">ChromaDB upsert · idempotent</text>

  <!-- ingest.py orchestrator label (right side) -->
  <rect x="776" y="104" width="198" height="62" rx="6"
        fill="#0a0c10" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="875" y="122" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#64748b" letter-spacing="1">ORCHESTRATOR</text>
  <text x="875" y="140" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#94a3b8">ingest.py</text>
  <text x="875" y="157" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#475569">extract → chunk → embed → index</text>


  <!-- ══════════════════════════════════════════
       SECTION 2: VECTOR STORES
  ══════════════════════════════════════════ -->
  <text x="26" y="216" font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#34d399" letter-spacing="3" font-weight="bold">VECTOR STORES</text>
  <rect x="26" y="220" width="948" height="1" fill="url(#rule-emerald)"/>

  <!-- Arrow: index.py → ChromaDB (down) -->
  <line x1="685" y1="173" x2="685" y2="240" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-emerald)"/>

  <!-- Arrow: index.py → BM25 (diagonal, as BM25 is built from same data) -->
  <line x1="670" y1="173" x2="548" y2="240" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-emerald)"/>

  <!-- ChromaDB cylinder -->
  <!-- body rect -->
  <rect x="622" y="254" width="126" height="60" fill="#031a0e" stroke="#34d399" stroke-width="1.5" filter="url(#g-emerald)"/>
  <!-- top ellipse -->
  <ellipse cx="685" cy="254" rx="63" ry="14" fill="#052b17" stroke="#34d399" stroke-width="1.5"/>
  <!-- bottom ellipse -->
  <ellipse cx="685" cy="314" rx="63" ry="14" fill="#031a0e" stroke="#34d399" stroke-width="1.5"/>
  <text x="685" y="281" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#6ee7b7">ChromaDB</text>
  <text x="685" y="298" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#34d399">HNSW · cosine · persistent</text>

  <!-- BM25 cylinder -->
  <rect x="470" y="254" width="126" height="60" fill="#031a0e" stroke="#34d399" stroke-width="1.5" filter="url(#g-emerald)"/>
  <ellipse cx="533" cy="254" rx="63" ry="14" fill="#052b17" stroke="#34d399" stroke-width="1.5"/>
  <ellipse cx="533" cy="314" rx="63" ry="14" fill="#031a0e" stroke="#34d399" stroke-width="1.5"/>
  <text x="533" y="281" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#6ee7b7">BM25 Index</text>
  <text x="533" y="298" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#34d399">in-memory · rank-bm25 · O(1) lookup</text>

  <!-- ChromaDB → BM25 dashed (built from ChromaDB at query init) -->
  <line x1="622" y1="284" x2="597" y2="284" stroke="#34d399" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-emerald)"/>
  <text x="609" y="277" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="8" fill="#34d39966">lazy</text>


  <!-- ══════════════════════════════════════════
       SECTION 3: QUERY PATH
  ══════════════════════════════════════════ -->
  <text x="26" y="358" font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#a78bfa" letter-spacing="3" font-weight="bold">QUERY PATH</text>
  <rect x="26" y="362" width="948" height="1" fill="url(#rule-violet)"/>

  <!-- Store → search.py arrows (bezier curves going down and left) -->
  <!-- BM25 → search.py -->
  <path d="M 533 328 C 533 390 196 390 196 414"
        fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3"
        marker-end="url(#arr-violet)"/>
  <!-- ChromaDB → search.py -->
  <path d="M 685 328 C 685 398 196 398 196 414"
        fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3"
        marker-end="url(#arr-violet)"/>

  <!-- User Query -->
  <rect x="22" y="376" width="96" height="74" rx="7"
        fill="#08050e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="70" y="408" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#c4b5fd">User</text>
  <text x="70" y="426" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#c4b5fd">Query</text>
  <text x="70" y="440" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#7c3aed">natural language</text>

  <!-- Arrow: User → search -->
  <line x1="119" y1="413" x2="140" y2="413" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- Stage 5: search.py -->
  <rect x="142" y="376" width="136" height="74" rx="7"
        fill="#0b0812" stroke="#a78bfa" stroke-width="1.5" filter="url(#g-violet)"/>
  <text x="210" y="398" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#c4b5fd" letter-spacing="1">STAGE 5</text>
  <text x="210" y="416" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#ede9fe">search.py</text>
  <text x="210" y="432" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#a78bfa">BM25 + Vector</text>
  <text x="210" y="444" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#a78bfa">RRF fusion</text>

  <!-- Arrow: search → reranker -->
  <line x1="279" y1="413" x2="302" y2="413" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- Cross-Encoder Reranker -->
  <rect x="304" y="376" width="148" height="74" rx="7"
        fill="#0b0812" stroke="#a78bfa" stroke-width="1.5" filter="url(#g-violet)"/>
  <text x="378" y="398" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#c4b5fd" letter-spacing="1">RERANKER</text>
  <text x="378" y="416" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#ede9fe">Cross-Encoder</text>
  <text x="378" y="432" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#a78bfa">ms-marco-MiniLM-L-6-v2</text>
  <text x="378" y="444" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#a78bfa">top-20 candidates</text>

  <!-- Arrow: reranker → caption -->
  <line x1="453" y1="413" x2="476" y2="413" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- Caption Extractor -->
  <rect x="478" y="376" width="148" height="74" rx="7"
        fill="#0b0812" stroke="#a78bfa" stroke-width="1.5" filter="url(#g-violet)"/>
  <text x="552" y="398" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#c4b5fd" letter-spacing="1">CAPTION</text>
  <text x="552" y="416" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#ede9fe">Extractor</text>
  <text x="552" y="432" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#a78bfa">best sentence per chunk</text>
  <text x="552" y="444" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#a78bfa">reuses cross-encoder</text>

  <!-- Arrow: caption → results -->
  <line x1="627" y1="413" x2="650" y2="413" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Results -->
  <rect x="652" y="376" width="148" height="74" rx="7"
        fill="#020e10" stroke="#22d3ee" stroke-width="1.5" filter="url(#g-cyan)"/>
  <text x="726" y="398" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#67e8f9" letter-spacing="1">OUTPUT</text>
  <text x="726" y="416" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="bold" fill="#cffafe">SearchResult</text>
  <text x="726" y="432" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#22d3ee">rank · score · caption</text>
  <text x="726" y="444" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#22d3ee">blob_name · metadata</text>


  <!-- ══════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════ -->
  <rect x="22" y="484" width="956" height="1" fill="#1e293b"/>
  <text x="26" y="503" font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#475569" letter-spacing="2">LEGEND</text>

  <!-- Ingestion stage -->
  <rect x="26" y="516" width="14" height="14" rx="3"
        fill="#0e0c02" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="46" y="528" font-family="Arial, Helvetica, sans-serif"
        font-size="10" fill="#94a3b8">Ingestion stage</text>

  <!-- Store -->
  <rect x="160" y="516" width="14" height="14" rx="3"
        fill="#031a0e" stroke="#34d399" stroke-width="1.5"/>
  <text x="180" y="528" font-family="Arial, Helvetica, sans-serif"
        font-size="10" fill="#94a3b8">Vector store</text>

  <!-- Query stage -->
  <rect x="290" y="516" width="14" height="14" rx="3"
        fill="#0b0812" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="310" y="528" font-family="Arial, Helvetica, sans-serif"
        font-size="10" fill="#94a3b8">Query stage</text>

  <!-- External / source -->
  <rect x="420" y="516" width="14" height="14" rx="3"
        fill="#0a1020" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="440" y="528" font-family="Arial, Helvetica, sans-serif"
        font-size="10" fill="#94a3b8">External service</text>

  <!-- Output -->
  <rect x="560" y="516" width="14" height="14" rx="3"
        fill="#020e10" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="580" y="528" font-family="Arial, Helvetica, sans-serif"
        font-size="10" fill="#94a3b8">Output</text>

  <!-- Dashed = lazy/async -->
  <line x1="660" y1="523" x2="686" y2="523" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="694" y="528" font-family="Arial, Helvetica, sans-serif"
        font-size="10" fill="#94a3b8">Lazy / async</text>

  <!-- Bottom version line -->
  <text x="974" y="642" text-anchor="end"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="#1e293b">BMO RAG v1</text>
</svg>
